pre-commit:
    piped: true
    commands:
        format:
            priority: 1
            run: |
                node scripts/format-staged.mts {staged_files}

post-merge:
    commands:
        install:
            run: |
                pnpm install
                pnpm build:all

commit-msg:
    commands:
        commitlint:
            run: npx commitlint --edit $1
